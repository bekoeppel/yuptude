name: Build and Release Bookmarklet

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install bookmarklet CLI
        run: npm install -g bookmarklet

      - name: Build bookmarklet
        run: |
          bookmarklet yuptude-1.0.js yuptude-1.0.bookmarklet.js

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: yuptude-1.0.bookmarklet.js
          generate_release_notes: true
